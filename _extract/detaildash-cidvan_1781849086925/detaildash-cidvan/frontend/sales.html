<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="icon" href="assets/images/detaildash-icon.png"/>

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/components/navbar/navbar.css"/>
    <link rel="stylesheet" href="css/components/sidebar/sidebar.css"/>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <title>Transaction | DetailDash</title>
</head>
<body>
    <nav name="navbar" class="navbar fixed-top navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <button class="toggle-sidebar-btn me-2" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <a href="#" class="navbar-brand mb-0 h1">
                <img class="d-inline-block align-top" src="assets/images/detaildash-name.png" width="240" alt="DetailDash Logo">
            </a>
            <button
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                class="navbar-toggler"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle Navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">  
                    <form class="d-flex ms-lg-2">
                        <input type="text" class="form-control me-2" placeholder="Search">
                        <button class="btn btn-outline-light" type="submit"><i class="fas fa-search"></i></button>
                    </form>
                </ul>
            </div>
        </div>
    </nav>

    <aside class="bg-dark text-light">
        <div class="sidebar d-flex flex-column nav nav-pills nav-flush">
            <a href="account.html" class="nav-link mb-1">
                <span class="material-symbols-outlined me-2">person</span>
                <h5>Account</h5>
            </a>
            <a href="index.html" class="nav-link mb-1">
                <span class="material-symbols-outlined me-2">dashboard</span>
                <h5>Dashboard</h5>
            </a>
            <a href="transaction.html" class="nav-link mb-1">
                <span class="material-symbols-outlined me-2">receipt_long</span>
                <h5>Transaction</h5>
            </a>
            <a href="sales.html" class="nav-link active mb-1">
                <span class="material-symbols-outlined me-2">search_insights</span>
                <h5>Sales</h5>
            </a>    
            <a href="inventory.html" class="nav-link mb-1">
                <span class="material-symbols-outlined me-2">inventory</span>
                <h5>Inventory</h5>
            </a>
            <a href="#" class="nav-link mb-1">
                <span class="material-symbols-outlined me-2">settings</span>
                <h5>Settings</h5>
            </a>
            <a href="login.html" class="nav-link">
                <span class="material-symbols-outlined me-2">logout</span>
                <h5>Log Out</h5>
            </a>
        </div>
    </aside>
    
    <!-- Local JS -->
    <script src="js/modules/sidebar.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-...." crossorigin="anonymous"></script>
